services:
  federation_frontend:
    build:
      context: ../..
      dockerfile: ./apps/federation/frontend/Dockerfile
      args:
        APP: federation
    image: ghcr.io/jeffrey-carr/federation-frontend:latest
    container_name: federation_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - '127.0.0.1:3001:3000'

  federation_backend:
    # ... build args ...
    image: ghcr.io/jeffrey-carr/federation-backend:latest
    container_name: federation_backend
    restart: unless-stopped
    volumes:
      - ./backend/docker.env:/app/.env:ro

      - ./backend/.oci:/app/.oci:ro

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - '127.0.0.1:3101:9999'

  redis:
    image: "redis:alpine" # Uses the lightweight Alpine Linux version of Redis
    ports:
      - '127.0.0.1:6379:6379'

