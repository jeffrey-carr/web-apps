name: Deploy App

on:
  push:
    tags:
      - 'federation-v*'
      - 'recipe_book-v*'
      - 'web_games-v*'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy'
        required: true
        type: choice
        options:
          - federation
          - recipe_book
          - web_games
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
      deploy:
        description: 'Deploy to server?'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      tag: ${{ steps.vars.outputs.tag }}
      deploy: ${{ steps.vars.outputs.deploy }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app_name=${{ inputs.app }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG_NAME=${GITHUB_REF_NAME}
            # Handle both federation-v1.0.0 and web_games-v1.0.0 styles
            # Extract everything before the first '-v'
            APP_NAME=$(echo $TAG_NAME | sed 's/-v[0-9].*//')
            echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          fi
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.deploy }}" == "false" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build-backend:
    runs-on: ubuntu-latest
    needs: [prep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ needs.prep.outputs.app_name }}/backend/Dockerfile
          push: true
          build-args: APP=${{ needs.prep.outputs.app_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prep.outputs.app_name }}-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prep.outputs.app_name }}-backend:${{ needs.prep.outputs.tag }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: [prep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Frontend .env
        working-directory: ./apps/${{ needs.prep.outputs.app_name }}/frontend
        run: echo "PUBLIC_ENVIRONMENT=prod" > .env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ needs.prep.outputs.app_name }}/frontend/Dockerfile
          push: true
          build-args: APP=${{ needs.prep.outputs.app_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prep.outputs.app_name }}-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prep.outputs.app_name }}-frontend:${{ needs.prep.outputs.tag }}

  deploy-federation:
    runs-on: ubuntu-latest
    needs: [prep, build-backend, build-frontend]
    if: needs.prep.outputs.deploy == 'true' && needs.prep.outputs.app_name == 'federation'
    environment: federation
    steps:
      - name: SSH to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP="federation"

            sudo mkdir -p /opt/apps/$APP/frontend
            sudo mkdir -p /opt/apps/$APP/backend/.oci
            sudo chown -R ${{ vars.SSH_USERNAME }}:${{ vars.SSH_USERNAME }} /opt/apps/$APP

            echo "${{ secrets.OCI_PRIVATE_KEY }}" > /opt/apps/$APP/backend/.oci/prod_private.pem
            chmod 644 /opt/apps/$APP/backend/.oci/prod_private.pem

            cat > /opt/apps/$APP/backend/.env << 'EOF'
            {
              "environment": "${{ vars.ENVIRONMENT }}",
              "mongoConnectionURL": "${{ secrets.MONGO_CONNECTION_URL }}",
              "port": "9999",
              "oracle_compartment_id": "${{ secrets.ORACLE_COMPARTMENT_ID }}",
              "oracle_user": "${{ secrets.ORACLE_USER }}",
              "oracle_fingerprint": "${{ secrets.ORACLE_FINGERPRINT }}",
              "oracle_key": "${{ vars.ORACLE_KEY_PATH }}",
              "oracle_tenancy": "${{ secrets.ORACLE_TENANCY }}",
              "oracle_region": "${{ vars.ORACLE_REGION }}"
            }
            EOF

            cat > /opt/apps/$APP/docker-compose.yml << 'EOF'
            services:
              federation_frontend:
                image: ghcr.io/${{ github.repository_owner }}/federation-frontend:latest
                container_name: federation_frontend
                restart: unless-stopped
                environment:
                  NODE_ENV: production
                ports:
                  - '3001:3000'

              federation_backend:
                image: ghcr.io/${{ github.repository_owner }}/federation-backend:latest
                container_name: federation_backend
                restart: unless-stopped
                volumes:
                  - ./backend/.env:/app/.env:ro
                  - ./backend/.oci:/app/.oci:ro
                ports:
                  - '3101:9999'
            EOF

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin
            cd /opt/apps/$APP
            docker compose pull
            docker compose up -d
            docker image prune -f

  deploy-recipe-book:
    runs-on: ubuntu-latest
    needs: [prep, build-backend, build-frontend]
    if: needs.prep.outputs.deploy == 'true' && needs.prep.outputs.app_name == 'recipe_book'
    environment: recipe_book
    steps:
      - name: SSH to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP="recipe_book"

            sudo mkdir -p /opt/apps/$APP/frontend
            sudo mkdir -p /opt/apps/$APP/backend
            sudo chown -R ${{ vars.SSH_USERNAME }}:${{ vars.SSH_USERNAME }} /opt/apps/$APP

            cat > /opt/apps/$APP/backend/.env << 'EOF'
            {
              "environment": "prod",
              "port": "9999",
              "mongo_connection_url": "${{ secrets.MONGO_CONNECTION_URL }}",
              "federation_api_key": "${{ secrets.FEDERATION_API_KEY }}"
            }
            EOF

            cat > /opt/apps/$APP/docker-compose.yml << 'EOF'
            services:
              recipe_book_frontend:
                image: ghcr.io/${{ github.repository_owner }}/recipe_book-frontend:latest
                container_name: recipe_book_frontend
                restart: unless-stopped
                environment:
                  NODE_ENV: production
                ports:
                  - '3002:3000'

              recipe_book_backend:
                image: ghcr.io/${{ github.repository_owner }}/recipe_book-backend:latest
                container_name: recipe_book_backend
                restart: unless-stopped
                volumes:
                  - ./backend/.env:/app/.env:ro
                ports:
                  - '3102:9999'
            EOF

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin
            cd /opt/apps/$APP
            docker compose pull
            docker compose up -d
            docker image prune -f

  deploy-web-games:
    runs-on: ubuntu-latest
    needs: [prep, build-backend, build-frontend]
    if: needs.prep.outputs.deploy == 'true' && needs.prep.outputs.app_name == 'web_games'
    environment: web_games
    steps:
      - name: SSH to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP="web_games"

            sudo mkdir -p /opt/apps/$APP/frontend
            sudo mkdir -p /opt/apps/$APP/backend
            sudo chown -R ${{ vars.SSH_USERNAME }}:${{ vars.SSH_USERNAME }} /opt/apps/$APP

            # Web Games is a Java app and expects key=value format
            cat > /opt/apps/$APP/backend/.env << 'EOF'
            ENVIRONMENT=prod
            SPRING_PROFILES_ACTIVE=prod
            MONGO_CONNECTION_URL=${{ secrets.MONGO_CONNECTION_URL }}
            FEDERATION_API_KEY=${{ secrets.FEDERATION_API_KEY }}
            EOF

            cat > /opt/apps/$APP/docker-compose.yml << 'EOF'
            services:
              web_games_frontend:
                image: ghcr.io/${{ github.repository_owner }}/web_games-frontend:latest
                container_name: web_games_frontend
                restart: unless-stopped
                environment:
                  NODE_ENV: production
                ports:
                  - '3003:3000'

              web_games_backend:
                image: ghcr.io/${{ github.repository_owner }}/web_games-backend:latest
                container_name: web_games_backend
                restart: unless-stopped
                volumes:
                  - ./backend/.env:/app/.env:ro
                ports:
                  - '3103:8081'
            EOF

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin
            cd /opt/apps/$APP
            docker compose pull
            docker compose up -d
            docker image prune -f
