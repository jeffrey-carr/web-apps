name: Build & Deploy Federation

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  APP_NAME: federation

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ env.APP_NAME }}/backend/Dockerfile
          push: true
          build-args: APP=${{ env.APP_NAME }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.APP_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.APP_NAME }}-backend:${{ github.ref_name }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Frontend .env
        working-directory: ./apps/${{ env.APP_NAME }}/frontend
        run: echo "PUBLIC_ENVIRONMENT=prod" > .env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ env.APP_NAME }}/frontend/Dockerfile
          push: true
          build-args: APP=${{ env.APP_NAME }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.APP_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.APP_NAME }}-frontend:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: federation
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Runtime Variables & OCI Keys
        working-directory: ./apps/${{ env.APP_NAME }}
        run: |
          mkdir -p backend/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > backend/.oci/prod_private.pem
          chmod 644 backend/.oci/prod_private.pem

          echo '${{ toJSON(secrets) }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' > backend/docker.env
          echo '${{ toJSON(vars) }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> backend/docker.env

      - name: Rsync Application Files
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_HOST: ${{ vars.SERVER_IP }}
          REMOTE_USER: ${{ vars.SSH_USERNAME || 'ubuntu' }}
          SOURCE: "apps/${{ env.APP_NAME }}/"
          TARGET: "/opt/apps/${{ env.APP_NAME }}"

      - name: Execute Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SSH_USERNAME || 'ubuntu' }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/${{ env.APP_NAME }}
            
            sudo chown -R ${{ vars.SSH_USERNAME || 'ubuntu' }}:${{ vars.SSH_USERNAME || 'ubuntu' }} .
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin
            
            docker compose pull
            docker compose up -d
            docker image prune -f
